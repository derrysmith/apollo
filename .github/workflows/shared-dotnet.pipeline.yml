name: CI/CD Pipeline for Shared .NET Core Libraries

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test-pack:
    name: Build/Test/Pack .NET Core Libraries
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      # with:
      #   fetch-depth: 0
    
    - name: Configure .NET Core
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '7.0.x'
    
    # - name: Configure GitVersion
    #   uses: gittools/actions/gitversion/setup@v0
    #   with:
    #     versionSpec: '5.x'
    #     preferLatestVersion: true
    
    - name: Restore
      run: dotnet restore
      working-directory: ./shared/dotnet
    
    - name: Compile
      run: dotnet build --configuration Release --no-restore
      working-directory: ./shared/dotnet
    
    - name: Testing
      run: dotnet test --no-restore
      working-directory: ./shared/dotnet

    # - name: Version
    #   id: gitversion
    #   uses: gittools/actions/gitversion/execute@v0
    
    # - name: Display Version
    #   run: echo "gitversion ${{ steps.gitversion.outputs }}"

    - name: Package
      run: dotnet pack --configuration Release --no-restore --no-build -o pkg --version-suffix "ci.$(date +%Y%m%d%H%M%S)"
      working-directory: ./shared/dotnet

    - name: Publish
      run: dotnet nuget push "pkg/**/*.nupkg" -s "${{ vars.GH_PACKAGES_SOURCE }}" -k "${{ secrets.GH_PACKAGES_PAT }}" --skip-duplicate
      working-directory: ./shared/dotnet
        
        
        
        
        